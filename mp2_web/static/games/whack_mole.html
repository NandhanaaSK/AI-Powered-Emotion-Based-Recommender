<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whack-a-Mole 🎯</title>
<style>
  body {
    margin: 0;
    font-family: "Poppins", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: linear-gradient(to top, #ffe156, #ff8fa3);
    height: 100vh;
  }

  h1 {
    margin-top: 20px;
    font-size: 2em;
    color: #fff;
    text-shadow: 0 0 20px #ff96c7;
  }

  #score, #timer {
    font-size: 1.5em;
    color: #fff;
    text-shadow: 0 0 10px #ff96c7;
    margin: 10px;
  }

  #gameContainer {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    grid-gap: 20px;
    margin-top: 20px;
  }

  .hole {
    width: 100px;
    height: 100px;
    background: #7ec850;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
  }

  .mole {
    width: 80px;
    height: 80px;
    background: brown;
    border-radius: 50%;
    position: absolute;
    top: 10px;
    transition: top 0.2s;
    display: none;
    font-size: 2em;
    text-align: center;
    line-height: 80px;
  }

  #startBtn {
    margin-top: 20px;
    padding: 15px 35px;
    font-size: 1.5em;
    font-weight: 700;
    border: none;
    border-radius: 50px;
    background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bc1ff, #ff6b6b);
    background-size: 300% 300%;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 8px 15px rgba(0,0,0,0.3);
    transition: 0.3s;
    text-shadow: 0 2px 5px rgba(0,0,0,0.2);
    animation: gradientAnimation 5s ease infinite;
  }

  #startBtn:hover {
    transform: scale(1.1);
    box-shadow: 0 12px 20px rgba(0,0,0,0.4);
  }

  @keyframes gradientAnimation {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
</style>
</head>
<body>

<h1>Whack-a-Mole 🎯</h1>
<div id="score">Score: 0</div>
<div id="timer">Time: 30s</div>
<button id="startBtn">Start Game</button>

<div id="gameContainer"></div>

<script>
const gameContainer = document.getElementById("gameContainer");
const startBtn = document.getElementById("startBtn");
const scoreText = document.getElementById("score");
const timerText = document.getElementById("timer");

let holes = [];
let score = 0;
let timeLeft = 30;
let gameInterval, moleInterval;

// Create holes
for(let i=0; i<9; i++){
  const hole = document.createElement("div");
  hole.classList.add("hole");
  const mole = document.createElement("div");
  mole.classList.add("mole");
  mole.textContent = "🐹";
  hole.appendChild(mole);
  gameContainer.appendChild(hole);
  holes.push(mole);

  // Click mole
  hole.addEventListener("click", () => {
    if(mole.style.display === "block"){
      score++;
      scoreText.textContent = `Score: ${score}`;
      mole.style.display = "none";
    }
  });
}

function startGame(){
  startBtn.style.display = "none";
  score = 0;
  timeLeft = 30;
  scoreText.textContent = `Score: ${score}`;
  timerText.textContent = `Time: ${timeLeft}s`;

  // Show mole randomly
  moleInterval = setInterval(() => {
    holes.forEach(mole => mole.style.display = "none"); // hide all
    const randomIndex = Math.floor(Math.random() * holes.length);
    holes[randomIndex].style.display = "block";
  }, 800); // mole pops every 0.8s

  // Timer
  gameInterval = setInterval(() => {
    timeLeft--;
    timerText.textContent = `Time: ${timeLeft}s`;
    if(timeLeft <= 0){
      clearInterval(gameInterval);
      clearInterval(moleInterval);
      holes.forEach(mole => mole.style.display = "none");
      alert(`🎉 Time's up! Final Score: ${score}`);
      startBtn.style.display = "block";
    }
  }, 1000);
}

startBtn.addEventListener("click", startGame);
</script>

</body>
</html>
