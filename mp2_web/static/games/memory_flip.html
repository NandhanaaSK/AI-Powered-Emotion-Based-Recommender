<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Flip Game 🧠</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #4b6cb7, #182848);
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: white;
      overflow: hidden;
    }

    h1 {
      margin-top: 20px;
      font-size: 28px;
      color: #ffd93d;
      text-shadow: 0 0 10px #ffd93d;
    }

    #score {
      font-size: 22px;
      margin: 10px;
      background: rgba(255, 255, 255, 0.15);
      padding: 10px 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px #ffd93d;
    }

    #startBtn {
      margin: 15px;
      background: linear-gradient(45deg, #ff9a9e, #fad0c4);
      color: #222;
      font-size: 20px;
      padding: 10px 30px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 0 15px #ff9a9e;
      transition: 0.3s;
    }

    #startBtn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px #fad0c4;
    }

    .game-board {
      display: grid;
      grid-template-columns: repeat(4, 100px);
      grid-gap: 15px;
      justify-content: center;
      margin-top: 20px;
    }

    .card {
      width: 100px;
      height: 100px;
      background: #ffffff20;
      border-radius: 10px;
      perspective: 600px;
      cursor: pointer;
      position: relative;
    }

    .card-inner {
      position: absolute;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.6s;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 10px;
      backface-visibility: hidden;
    }

    .card-front {
      background: rgba(255, 255, 255, 0.2);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 30px;
      color: #fff;
    }

    .card-back {
      background: #fff;
      color: #333;
      transform: rotateY(180deg);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 30px;
      border: 3px solid #ffd93d;
      box-shadow: 0 0 10px #ffd93d;
    }

    #endMessage {
      display: none;
      margin-top: 20px;
      font-size: 24px;
      color: #ffecb3;
      text-shadow: 0 0 10px #ffd93d;
    }
  </style>
</head>
<body>
  <h1>Memory Flip Game 🧠</h1>
  <div id="score">Score: 0</div>
  <button id="startBtn">Start Game</button>
  <div class="game-board" id="gameBoard"></div>
  <div id="endMessage">🎉 Round Complete! Great Memory!</div>

  <script>
    const startBtn = document.getElementById('startBtn');
    const gameBoard = document.getElementById('gameBoard');
    const scoreDisplay = document.getElementById('score');
    const endMessage = document.getElementById('endMessage');
    let cards = [];
    let flippedCards = [];
    let score = 0;
    let matchedPairs = 0;

    const symbols = ['⭐','🌙','🌸','🍀','🔥','❄️','⚡','🌈'];

    function createBoard() {
      gameBoard.innerHTML = '';
      const allSymbols = [...symbols, ...symbols].sort(() => 0.5 - Math.random());
      allSymbols.forEach(symbol => {
        const card = document.createElement('div');
        card.classList.add('card');
        card.innerHTML = `
          <div class="card-inner">
            <div class="card-front">?</div>
            <div class="card-back">${symbol}</div>
          </div>`;
        gameBoard.appendChild(card);

        card.addEventListener('click', () => flipCard(card, symbol));
      });
    }

    function flipCard(card, symbol) {
      if (flippedCards.length < 2 && !card.classList.contains('flipped')) {
        card.classList.add('flipped');
        flippedCards.push({card, symbol});

        if (flippedCards.length === 2) {
          setTimeout(checkMatch, 700);
        }
      }
    }

    function checkMatch() {
      const [first, second] = flippedCards;

      if (first.symbol === second.symbol) {
        score += 10;
        matchedPairs++;
        first.card.style.pointerEvents = 'none';
        second.card.style.pointerEvents = 'none';
      } else {
        first.card.classList.remove('flipped');
        second.card.classList.remove('flipped');
      }

      flippedCards = [];
      scoreDisplay.textContent = 'Score: ' + score;

      if (matchedPairs === symbols.length) {
        endRound();
      }
    }

    function startGame() {
      score = 0;
      matchedPairs = 0;
      flippedCards = [];
      endMessage.style.display = 'none';
      scoreDisplay.textContent = 'Score: 0';
      startBtn.style.display = 'none';
      createBoard();
    }

    function endRound() {
      endMessage.style.display = 'block';
      startBtn.textContent = 'Play Again';
      startBtn.style.display = 'block';
    }

    startBtn.addEventListener('click', startGame);
  </script>
</body>
</html>
